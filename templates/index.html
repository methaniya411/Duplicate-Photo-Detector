<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f1117">
    <title>Duplicate Photo Detector</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #242836;
            --border: #2e3345;
            --text: #e4e6f0;
            --text-dim: #8b8fa3;
            --accent: #6c5ce7;
            --accent-hover: #7f71ed;
            --danger: #e74c3c;
            --danger-hover: #c0392b;
            --success: #2ecc71;
            --warning: #f39c12;
            --radius: 12px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            line-height: 1.6;
            padding-bottom: calc(70px + var(--safe-bottom));
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 16px; }

        header {
            text-align: center;
            padding: 24px 0 20px;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        header p { color: var(--text-dim); font-size: 0.85rem; }

        /* Upload Section */
        .upload-section { margin-bottom: 20px; }

        .upload-btn {
            width: 100%;
            padding: 24px;
            background: var(--surface);
            border: 2px dashed var(--accent);
            border-radius: var(--radius);
            color: var(--accent);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
        }

        .upload-btn:active { background: rgba(108, 92, 231, 0.1); transform: scale(0.98); }

        .upload-info {
            text-align: center;
            padding: 12px;
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .upload-info.has-files { color: var(--success); }

        /* Mobile Directory Browser */
        .dir-browser {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 16px;
            display: none;
        }

        .dir-browser.active { display: block; }

        .dir-header {
            padding: 12px 16px;
            background: var(--surface2);
            font-size: 0.8rem;
            color: var(--text-dim);
            font-family: monospace;
            position: sticky;
            top: 0;
        }

        .dir-list { padding: 8px; }

        .dir-item {
            padding: 14px 16px;
            cursor: pointer;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1rem;
            transition: background 0.15s;
        }

        .dir-item:active { background: var(--accent); }
        .dir-item.selected { background: rgba(46, 204, 113, 0.2); color: var(--success); }

        .dir-item.back {
            color: var(--accent);
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            margin-bottom: 8px;
            padding-bottom: 12px;
        }

        /* Settings */
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .setting-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
        }

        .setting-card label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .setting-card input, .setting-card select {
            width: 100%;
            padding: 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 1rem;
            outline: none;
        }

        .setting-card select { cursor: pointer; }

        /* Scan Button */
        .scan-btn {
            width: 100%;
            padding: 18px;
            background: var(--accent);
            border: none;
            border-radius: var(--radius);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
            margin-bottom: 20px;
        }

        .scan-btn:active { background: var(--accent-hover); transform: scale(0.98); }
        .scan-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* Progress */
        .progress-section { 
            display: none; 
            margin-bottom: 20px;
        }
        .progress-section.active { display: block; }

        .progress-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
        }

        .progress-status {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .progress-bar {
            height: 10px;
            background: var(--surface2);
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #a29bfe);
            border-radius: 5px;
            transition: width 0.3s;
            width: 0%;
        }

        .progress-numbers {
            font-size: 0.85rem;
            color: var(--text-dim);
            display: flex;
            justify-content: space-between;
        }

        /* Results */
        .results { display: none; }
        .results.active { display: block; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 12px;
            text-align: center;
        }

        .stat-card .value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-card .label {
            font-size: 0.65rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .action-btn {
            padding: 16px;
            border: none;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .action-btn.delete {
            background: var(--danger);
            color: white;
        }

        .action-btn.move {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
        }

        .action-btn:active { transform: scale(0.97); }

        /* Duplicate Groups */
        .dup-group {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 16px;
            overflow: hidden;
        }

        .dup-group-header {
            padding: 14px 16px;
            background: var(--surface2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .group-info {
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        .badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 700;
        }

        .badge-exact { background: var(--danger); color: white; }
        .badge-near { background: var(--warning); color: #333; }

        .dup-images {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .img-card {
            background: var(--surface2);
            border-radius: 10px;
            overflow: hidden;
        }

        .img-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
        }

        .img-card .card-body {
            padding: 12px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .tag {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .tag-keep { background: var(--success); color: white; }
        .tag-dup { background: var(--danger); color: white; }

        .img-name {
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .img-meta { font-size: 0.75rem; color: var(--text-dim); }

        .no-img {
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            color: var(--text-dim);
            font-size: 2.5rem;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            padding: 8px 0;
            padding-bottom: calc(8px + var(--safe-bottom));
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.7rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .nav-item.active { color: var(--accent); }
        .nav-item .icon { font-size: 1.4rem; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            z-index: 1001;
            opacity: 0;
            transition: all 0.3s;
            max-width: 90%;
            text-align: center;
        }

        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast-success { background: var(--success); color: white; }
        .toast-error { background: var(--danger); color: white; }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }

        .empty-state .icon { font-size: 4rem; margin-bottom: 16px; }
        .empty-state h3 { font-size: 1.2rem; margin-bottom: 8px; color: var(--text); }
        .empty-state p { font-size: 0.9rem; }

        /* Desktop */
        @media (min-width: 768px) {
            .container { padding: 24px; }
            header h1 { font-size: 2rem; }
            header { padding: 40px 0 32px; }
            .settings-grid { grid-template-columns: repeat(4, 1fr); }
            .stats-grid { grid-template-columns: repeat(3, 1fr); }
            .dup-images { flex-direction: row; flex-wrap: wrap; }
            .img-card { flex: 1; min-width: 200px; max-width: 250px; }
            .action-buttons { grid-template-columns: auto auto; max-width: 400px; }
            .bottom-nav { display: none; }
            body { padding-bottom: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Duplicate Photo Detector</h1>
            <p>Find and remove duplicate photos</p>
        </header>

        <section class="upload-section">
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <button class="upload-btn" onclick="selectFolder()" style="flex:1; padding: 16px; font-size: 1rem;">
                    &#128194; Select Folder
                </button>
                <button class="upload-btn" onclick="selectPhotos()" style="flex:1; padding: 16px; font-size: 1rem;">
                    &#128247; Select Photos
                </button>
            </div>
            <input type="file" id="folderInput" webkitdirectory directory multiple style="display:none;" onchange="handlePhotos(this.files)">
            <input type="file" id="photoInput" multiple accept="image/*" style="display:none;" onchange="handlePhotos(this.files)">
            <div class="upload-info" id="uploadInfo">
                <span id="selectedCount">No photos or folder selected</span>
            </div>
        </section>

        <div class="settings-grid">
            <div class="setting-card">
                <label>Similarity</label>
                <input type="number" id="threshold" value="10" min="0" max="64">
            </div>
            <div class="setting-card">
                <label>Hash Algorithm</label>
                <select id="hashType">
                    <option value="phash">pHash</option>
                    <option value="dhash">dHash</option>
                    <option value="ahash">aHash</option>
                    <option value="whash">wHash</option>
                </select>
            </div>
        </div>

        <button class="scan-btn" id="scanBtn" onclick="startScan()">
            <span>&#128269;</span> Start Scan
        </button>

        <section class="progress-section" id="progressSection">
            <div class="progress-card">
                <div class="progress-status">
                    <span>&#9203;</span>
                    <span id="progressStatus">Scanning...</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-numbers">
                    <span id="progressFiles">0 / 0 files</span>
                    <span id="progressPct">0%</span>
                </div>
            </div>
        </section>

        <section class="results" id="results">
            <div class="stats-grid" id="stats"></div>

            <div class="action-buttons">
                <button class="action-btn delete" onclick="deleteDuplicates()">
                    &#128465; Delete All
                </button>
                <button class="action-btn move" onclick="moveDuplicates()">
                    &#128193; Move All
                </button>
            </div>

            <div id="groups"></div>
        </section>

        <div class="empty-state" id="emptyState">
            <div class="icon">&#128247;</div>
            <h3>Ready to Scan</h3>
            <p>Select photos from your phone and tap Start Scan</p>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="scrollToTop()">
            <span class="icon">&#128269;</span>
            <span>Scan</span>
        </div>
        <div class="nav-item" onclick="scrollToResults()">
            <span class="icon">&#128202;</span>
            <span>Results</span>
        </div>
    </nav>

    <div class="toast" id="toast"></div>

    <script>
        let currentScanId = null;
        let selectedFiles = [];
        let uploadSessionId = null;

        function selectPhotos() {
            document.getElementById('photoInput').click();
        }

        function selectFolder() {
            document.getElementById('folderInput').click();
        }

        function handlePhotos(files) {
            selectedFiles = Array.from(files);
            const count = selectedFiles.length;
            const uploadInfo = document.getElementById('uploadInfo');
            
            if (count > 0) {
                uploadInfo.textContent = `${count} file${count > 1 ? 's' : ''} selected`;
                uploadInfo.classList.add('has-files');
                showToast(`${count} files ready to scan`, 'success');
            } else {
                uploadInfo.textContent = 'No selection';
                uploadInfo.classList.remove('has-files');
            }
        }

        async function startScan() {
            if (selectedFiles.length === 0) { 
                showToast('Please select photos first', 'error'); 
                return; 
            }

            const threshold = parseInt(document.getElementById('threshold').value) || 10;
            const hashType = document.getElementById('hashType').value;

            document.getElementById('scanBtn').disabled = true;
            document.getElementById('scanBtn').innerHTML = '<span>&#9203;</span> Uploading...';
            document.getElementById('progressSection').classList.add('active');
            document.getElementById('results').classList.remove('active');
            document.getElementById('emptyState').style.display = 'none';

            try {
                const formData = new FormData();
                selectedFiles.forEach((file, i) => {
                    formData.append('photos', file);
                });
                formData.append('threshold', threshold);
                formData.append('hash_type', hashType);

                const resp = await fetch('/api/upload-scan', {
                    method: 'POST',
                    body: formData
                });

                if (!resp.ok) {
                    const err = await resp.json();
                    showToast(err.error || 'Upload failed', 'error');
                    resetUI();
                    return;
                }

                const data = await resp.json();
                uploadSessionId = data.scan_id;
                pollProgress();
            } catch (e) {
                showToast('Connection error: ' + e.message, 'error');
                resetUI();
            }
        }

        async function pollProgress() {
            const poll = async () => {
                const scanId = uploadSessionId || currentScanId;
                const resp = await fetch(`/api/progress/${scanId}`);
                const data = await resp.json();

                document.getElementById('progressFill').style.width = data.progress.pct + '%';
                document.getElementById('progressPct').textContent = data.progress.pct + '%';
                document.getElementById('progressFiles').textContent = 
                    `${data.progress.current} / ${data.progress.total} files`;
                document.getElementById('progressStatus').textContent = capitalize(data.progress.status) + '...';

                if (data.done) {
                    loadResults();
                } else {
                    setTimeout(poll, 500);
                }
            };
            poll();
        }

        async function loadResults() {
            const scanId = uploadSessionId || currentScanId;
            const resp = await fetch(`/api/results/${scanId}`);
            const data = await resp.json();

            resetUI();
            document.getElementById('progressSection').classList.remove('active');

            if (data.total_groups === 0) {
                document.getElementById('emptyState').style.display = 'block';
                document.getElementById('emptyState').innerHTML = `
                    <div class="icon">&#9989;</div>
                    <h3>No Duplicates Found</h3>
                    <p>Your photos are clean!</p>`;
                return;
            }

            const spaceMB = (data.total_space / (1024 * 1024)).toFixed(1);
            document.getElementById('stats').innerHTML = `
                <div class="stat-card">
                    <div class="value">${data.total_groups}</div>
                    <div class="label">Groups</div>
                </div>
                <div class="stat-card">
                    <div class="value">${data.total_duplicates}</div>
                    <div class="label">Duplicates</div>
                </div>
                <div class="stat-card">
                    <div class="value">${spaceMB} MB</div>
                    <div class="label">Space</div>
                </div>`;

            let html = '';
            data.groups.forEach((g, i) => {
                const badge = g.type === 'exact'
                    ? '<span class="badge badge-exact">Exact</span>'
                    : '<span class="badge badge-near">Near</span>';

                html += `
                <div class="dup-group">
                    <div class="dup-group-header">
                        <span class="group-info">Group ${i + 1} &bull; ${g.duplicates.length + 1} photos</span>
                        ${badge}
                    </div>
                    <div class="dup-images">
                        <div class="img-card">
                            ${g.keeper_info.thumb
                                ? `<img src="data:image/jpeg;base64,${g.keeper_info.thumb}">`
                                : `<div class="no-img">&#127748;</div>`}
                            <div class="card-body">
                                <div class="card-header">
                                    <span class="tag tag-keep">Keep</span>
                                </div>
                                <div class="img-name" title="${g.keeper_info.name}">${g.keeper_info.name}</div>
                                <div class="img-meta">${(g.keeper_info.size / 1024).toFixed(0)} KB &bull; ${g.keeper_info.width}x${g.keeper_info.height}</div>
                            </div>
                        </div>`;

                g.duplicates_info.forEach(d => {
                    html += `
                        <div class="img-card">
                            ${d.thumb
                                ? `<img src="data:image/jpeg;base64,${d.thumb}">`
                                : `<div class="no-img">&#127748;</div>`}
                            <div class="card-body">
                                <div class="card-header">
                                    <span class="tag tag-dup">Duplicate</span>
                                </div>
                                <div class="img-name" title="${d.name}">${d.name}</div>
                                <div class="img-meta">${(d.size / 1024).toFixed(0)} KB &bull; ${d.width}x${d.height}</div>
                            </div>
                        </div>`;
                });

                html += `</div></div>`;
            });

            document.getElementById('groups').innerHTML = html;
            document.getElementById('results').classList.add('active');
            document.querySelector('.nav-item:last-child').classList.add('active');
        }

        async function deleteDuplicates() {
            if (!confirm('Permanently delete all duplicate files? This cannot be undone.')) return;
            await doAction('delete');
        }

        async function moveDuplicates() {
            await doAction('move');
        }

        async function doAction(action) {
            const scanId = uploadSessionId || currentScanId;
            const resp = await fetch('/api/action', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ scan_id: scanId, action })
            });
            const data = await resp.json();

            if (data.error) {
                showToast(data.error, 'error');
                return;
            }

            const count = action === 'delete' ? data.deleted.length : data.moved.length;
            showToast(`${count} duplicates ${action === 'delete' ? 'deleted' : 'moved'}`, 'success');
            loadResults();
        }

        function resetUI() {
            document.getElementById('scanBtn').disabled = false;
            document.getElementById('scanBtn').innerHTML = '<span>&#128269;</span> Start Scan';
        }

        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = `toast toast-${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function capitalize(str) {
            return str.charAt(0).toUpperCase() + str.slice(1);
        }

        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            document.querySelector('.nav-item:first-child').classList.add('active');
            document.querySelector('.nav-item:last-child').classList.remove('active');
        }

        function scrollToResults() {
            document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
            document.querySelector('.nav-item:last-child').classList.add('active');
            document.querySelector('.nav-item:first-child').classList.remove('active');
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</body>
</html>
