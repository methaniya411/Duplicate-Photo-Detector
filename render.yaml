services:
  - type: web
    name: duplicate-photo-detector
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --threads 4 app:app
    healthCheck:
      path: /
      interval: 30
      timeout: 10
      retries: 3
    envVars:
      - key: PORT
        value: 10000
      - key: FLASK_ENV
        value: production
